<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Global Clicker</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: Arial;
    }

    #counter {
      font-size: 60px;
      margin-bottom: 20px;
    }

    button {
      font-size: 30px;
      padding: 15px 40px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div id="counter">0</div>
<button id="btn">przycisk</button>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot } 
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // 🔥 TWÓJ CONFIG (już wstawiony)
  const firebaseConfig = {
    apiKey: "AIzaSyCrciullML6Ewrr-dmz5Vj7WCgNVXeq92A",
    authDomain: "totastrona.firebaseapp.com",
    projectId: "totastrona",
    storageBucket: "totastrona.firebasestorage.app",
    messagingSenderId: "68166376642",
    appId: "1:68166376642:web:1e59a8ebd94a1bc2bfaf5b",
    measurementId: "G-RC5MQY0HJ0"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const counter = document.getElementById("counter");
  const btn = document.getElementById("btn");

  const ref = doc(db, "clicker", "global");

  // tworzy licznik jeśli nie istnieje
  setDoc(ref, { count: 0 }, { merge: true });

  // LIVE licznik (wszyscy widzą to samo)
  onSnapshot(ref, (snap) => {
    counter.textContent = snap.data().count;
  });

  let canClick = true;

  btn.addEventListener("click", async () => {
    if (!canClick) return;
    canClick = false;

    const data = await getDoc(ref);
    const current = data.exists() ? data.data().count : 0;

    await updateDoc(ref, {
      count: current + 1
    });

    setTimeout(() => canClick = true, 200); // cooldown 0.2s
  });

</script>

</body>
</html>
